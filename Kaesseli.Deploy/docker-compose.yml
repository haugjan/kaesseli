services:
  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.2
    container_name: kaesseli-aspire
    restart: unless-stopped
    ports:
      - "18888:18888"
      - "4317:18889"
      - "4318:18890"
    environment:
      DASHBOARD__FRONTEND__AUTHMODE: Unsecured
      DASHBOARD__OTLP__AUTHMODE: ApiKey
      DASHBOARD__OTLP__PRIMARYAPIKEY: kaesseli-dev
