<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Käseli</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <meta name="theme-color" content="#76B041" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Käseli" />
    <link href="Kaesseli.Client.Blazor.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="_content/Microsoft.AspNetCore.Components.WebAssembly.Authentication/AuthenticationService.js"></script>
    <script>
        window.kaesseli = {
            downloadText: (filename, contentType, text) => {
                const blob = new Blob([text], { type: contentType });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            },
            scrollToElement: (id) => {
                const el = document.getElementById(id);
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        };
        window.kaesseliAuth = {
            getIdToken: function () {
                for (const key of Object.keys(sessionStorage)) {
                    if (key.startsWith('oidc.user:')) {
                        try {
                            const user = JSON.parse(sessionStorage.getItem(key));
                            if (user && user.id_token) return user.id_token;
                        } catch { /* ignore parse error */ }
                    }
                }
                return null;
            }
        };
    </script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        window.kaesseliPwa = (function () {
            let dotNetRef = null;
            let waitingWorker = null;
            let reloading = false;

            function notifyDotNet() {
                if (dotNetRef) {
                    dotNetRef.invokeMethodAsync('OnUpdateAvailable');
                }
            }

            function trackInstalling(worker) {
                worker.addEventListener('statechange', () => {
                    if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                        waitingWorker = worker;
                        notifyDotNet();
                    }
                });
            }

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('service-worker.js').then(reg => {
                    if (reg.waiting && navigator.serviceWorker.controller) {
                        waitingWorker = reg.waiting;
                        notifyDotNet();
                    }
                    if (reg.installing) trackInstalling(reg.installing);
                    reg.addEventListener('updatefound', () => {
                        if (reg.installing) trackInstalling(reg.installing);
                    });
                    document.addEventListener('visibilitychange', () => {
                        if (document.visibilityState === 'visible') {
                            reg.update().catch(() => { });
                        }
                    });
                }).catch(() => { });

                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    if (reloading) return;
                    reloading = true;
                    location.reload();
                });
            }

            return {
                init: function (ref) {
                    dotNetRef = ref;
                    if (waitingWorker) notifyDotNet();
                },
                applyUpdate: function () {
                    if (waitingWorker) {
                        waitingWorker.postMessage({ type: 'SKIP_WAITING' });
                    }
                }
            };
        })();
    </script>
</body>

</html>
